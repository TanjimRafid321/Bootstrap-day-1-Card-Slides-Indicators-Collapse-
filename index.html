<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Group</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mountains+of+Christmas:wght@400;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<style>
html, body {
  background-color: black;
  color: white;
  font-family: "Mountains of Christmas", serif;
}

/* keep all text white */
body, h1, h2, h3, h4, h5, h6, p, a, div, span {
  color: white;
}

/* remove default blue link style */
a {
  text-decoration: none;
}

/* card styling */
.card {
  max-width: 40rem;
  min-width: 15rem;
  background-color: black;
  margin: auto;
  border: 1px solid white;
}

/* title styling */
.title {
  padding-left: 2rem;
  font-weight: bold;
  border-bottom: 2px solid white;
}

/* carousel image fix */
.carousel-img {
  max-width: 400px;
  margin: auto;
}
</style>

</head>

<body>

<!-- CARD -->
<div class="card">

  <img src="https://scontent.fdac154-1.fna.fbcdn.net/v/t39.30808-6/475073185_1009782297657795_3494582154348519623_n.jpg?stp=dst-jpg_s960x960_tt6&_nc_cat=111&ccb=1-7&_nc_sid=cc71e4&_nc_ohc=hZ0z6qSc_EMQ7kNvwGG9uKQ&_nc_oc=Adrh--zK21JcHCLtHZtIxnUrnnKsSAMiueTFwjj6cEo48BwPStKYk_0ANqH-tbB64Kk&_nc_zt=23&_nc_ht=scontent.fdac154-1.fna&_nc_gid=oXK7DW9NqFlkRyf24HGe4g&_nc_ss=7b2a8&oh=00_Af560xciBB0rDaI8KwvRwub06n_MD8f8KW6mF7i1jse2TA&oe=6A0FCB98"
       class="card-img-top" alt="group image">

  <div class="card-body">

    <h5 class="title">The Group</h5>

    <p class="title">Deep down, we were together because we needed each other.</p>

    <a href="https://www.facebook.com/FarhanTanjimRafid" class="btn btn-primary">Tanjim Rafid</a>
    <a href="https://www.facebook.com/abida.raphasana" class="btn btn-primary">Abid Rafsan</a>
    <a href="https://www.facebook.com/profile.php?id=61586998166391" class="btn btn-primary">Abdullah Al Hasib</a>
    <a href="https://www.facebook.com/sadmanibna.bokul" class="btn btn-primary">Sadman Bokul</a>

  </div>
</div>

<!-- HEADING -->
<div class="text-center mt-4">
  <h2>As the Big 3 are-</h2>
</div>

<!-- CAROUSEL -->
<div id="carouselExample" class="carousel slide">

  <div class="carousel-indicators">
    <button type="button" data-bs-target="#carouselExample" data-bs-slide-to="0" class="active"></button>
    <button type="button" data-bs-target="#carouselExample" data-bs-slide-to="1"></button>
    <button type="button" data-bs-target="#carouselExample" data-bs-slide-to="2"></button>
  </div>

  <div class="carousel-inner text-center">

    <div class="carousel-item active">
      <img src="Images for Slide/Slide1.png" class="d-block carousel-img" alt="slide1">
    </div>

    <div class="carousel-item">
      <img src="Images for Slide/slide2.jpg" class="d-block carousel-img" alt="slide2">
    </div>

    <div class="carousel-item">
      <img src="Images for Slide/slide3.jpg" class="d-block carousel-img" alt="slide3">
    </div>

  </div>

  <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
    <span class="carousel-control-prev-icon"></span>
  </button>

  <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
    <span class="carousel-control-next-icon"></span>
  </button>

</div>

<!-- COLLAPSE -->
<div class="text-center mt-4">

  <button class="btn btn-primary" type="button"
    data-bs-toggle="collapse" data-bs-target="#fact">
    Interesting Fact
  </button>

  <div class="collapse mt-2" id="fact">
    <div class="card card-body">
      I am the hottest among the 3 😎
    </div>
  </div>

</div>

</body>
</html>
